<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Job Application Agent</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script>
    (function(){
      var t = localStorage.getItem('theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --primary:      #1A3C5E;
      --border:       #2B6CB0;
      --fill:         #EEF4FB;
      --text:         #111827;
      --muted:        #6B7280;
      --error:        #DC2626;
      --bg-page:      #F9FAFB;
      --bg-card:      #FFFFFF;
      --card-border:  #E5E7EB;
      --input-bg:     #FFFFFF;
      --input-border: #D1D5DB;
    }

    [data-theme="dark"] {
      --primary:      #A5B4FC;
      --border:       #6366F1;
      --fill:         #1A1A2E;
      --text:         #F0F0F5;
      --muted:        #94A3B8;
      --error:        #F87171;
      --bg-page:      #0A0A0A;
      --bg-card:      #111111;
      --card-border:  #1E1E1E;
      --input-bg:     #161616;
      --input-border: #2B2B2B;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-page); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem; transition: background .2s, color .2s;
    }

    .card {
      background: var(--bg-card); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 2rem; width: 100%; max-width: 400px;
      transition: background .2s, border-color .2s;
    }

    .logo-wrap { display: flex; align-items: center; gap: .75rem; margin-bottom: .25rem; }
    .logo-img  { width: 36px; height: 36px; }
    .logo-light { display: block; }
    .logo-dark  { display: none;  }
    [data-theme="dark"] .logo-light { display: none;  }
    [data-theme="dark"] .logo-dark  { display: block; }

    .logo { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .sub  { font-size: .875rem; color: var(--muted); margin-bottom: 1.75rem; margin-top: .2rem; }

    .field { margin-bottom: 1rem; }
    label  { display: block; font-weight: 600; font-size: .825rem; margin-bottom: .3rem; }

    input {
      width: 100%; padding: .5rem .75rem;
      border: 1px solid var(--input-border); border-radius: 6px;
      font-size: .9rem; font-family: inherit;
      background: var(--input-bg); color: var(--text);
      transition: border-color .15s, background .2s, color .2s;
    }
    input:focus { outline: none; border-color: var(--border); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }

    .btn {
      width: 100%; padding: .625rem;
      background: var(--primary); color: white;
      border: none; border-radius: 6px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; margin-top: .5rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.12); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .err {
      background: #FEF2F2; border: 1px solid #FECACA; border-radius: 6px;
      padding: .625rem .875rem; color: var(--error); font-size: .825rem;
      margin-bottom: 1rem; display: none;
    }
    [data-theme="dark"] .err { background: #2B1010; border-color: #7F1D1D; }

    .footer { text-align: center; margin-top: 1.25rem; font-size: .825rem; color: var(--muted); }
    .footer a { color: var(--border); text-decoration: none; font-weight: 600; }

    .theme-toggle {
      position: fixed; top: 1rem; right: 1rem;
      background: var(--bg-card); border: 1px solid var(--card-border);
      border-radius: 20px; padding: .3rem .65rem;
      cursor: pointer; font-size: .8rem; color: var(--muted);
      transition: border-color .15s, color .15s;
    }
    .theme-toggle:hover { border-color: var(--border); color: var(--text); }

    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: white;
      border-radius: 50%; animation: rot .7s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle"><span id="themeIcon"></span></button>
<div class="card">
  <div class="logo-wrap">
    <img class="logo-img logo-light" src="/img/logo-light.png" alt="Logo">
    <img class="logo-img logo-dark"  src="/img/logo-dark.png"  alt="Logo">
    <div class="logo">Job Application Agent</div>
  </div>
  <div class="sub">Sign in to your account</div>
  <div class="err" id="err"></div>
  <form id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
    </div>
    <button class="btn" type="submit" id="submitBtn">Sign In</button>
  </form>
  <div class="footer">Don't have an account? <a href="/register.html">Create one →</a></div>
</div>
<script>
  const ICONS = { light: '☀', dark: '🌙' };
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    document.getElementById('themeIcon').textContent = ICONS[t];
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
  document.getElementById('themeIcon').textContent =
    ICONS[document.documentElement.getAttribute('data-theme')] || ICONS.light;

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('err');
    const data = Object.fromEntries(new FormData(e.target));
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Signing in…';
    err.style.display = 'none';
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
      });
      const body = await res.json();
      if (!res.ok) {
        err.textContent = body.detail ?? 'Sign in failed.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = '/';
      }
    } catch (ex) {
      err.textContent = 'Network error — please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
