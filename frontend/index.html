<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --primary: #1A3C5E;
      --border:  #2B6CB0;
      --fill:    #EEF4FB;
      --text:    #111827;
      --muted:   #6B7280;
      --error:   #DC2626;
      --success: #065F46;
      --radius:  8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #F9FAFB;
      color: var(--text);
      margin: 0;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .container { max-width: 760px; margin: 0 auto; }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--primary);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin: 0 0 .25rem; }
    header p  { color: var(--muted); margin: 0; font-size: .9rem; }

    .settings-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.2rem;
      padding: .25rem;
      border-radius: 4px;
      line-height: 1;
      transition: color .15s, background .15s;
      flex-shrink: 0;
      margin-top: .2rem;
    }
    .settings-toggle:hover { color: var(--primary); background: var(--fill); }

    /* ── Settings (password change) ──────────────────────────────── */
    .settings-panel {
      background: white;
      border-radius: var(--radius);
      border: 1px solid #E5E7EB;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .settings-panel h3 { font-size: .9rem; font-weight: 700; margin: 0 0 1rem; color: var(--primary); }

    .pw-fields { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .875rem; }
    @media (max-width: 520px) { .pw-fields { grid-template-columns: 1fr; } }

    .settings-result {
      font-size: .825rem;
      padding: .6rem .875rem;
      border-radius: 6px;
      margin-top: .75rem;
      display: none;
    }
    .settings-result.ok  { background: #D1FAE5; color: var(--success); }
    .settings-result.err { background: #FEE2E2; color: var(--error); }

    .card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid #E5E7EB;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: 1.25rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-weight: 600;
      font-size: .875rem;
      margin-bottom: .375rem;
    }
    label .opt { font-weight: 400; color: var(--muted); font-size: .8rem; }

    input[type="text"], textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      font-size: .9rem;
      font-family: inherit;
      color: var(--text);
      background: white;
      transition: border-color .15s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--border);
      box-shadow: 0 0 0 3px rgba(43,108,176,.12);
    }
    textarea { resize: vertical; min-height: 180px; line-height: 1.5; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 520px) { .row { grid-template-columns: 1fr; } }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .625rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn:hover:not(:disabled) { background: #15304e; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .btn-ghost {
      background: white;
      color: var(--primary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--fill); }

    /* ── Progress ─────────────────────────────────────────────────── */
    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .progress-header h2 { font-size: 1rem; font-weight: 600; margin: 0; color: var(--primary); }

    .badge {
      font-size: .72rem;
      padding: .2rem .6rem;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .badge-running { background: #DBEAFE; color: #1D4ED8; }
    .badge-queued  { background: #FEF3C7; color: #92400E; }
    .badge-done    { background: #D1FAE5; color: var(--success); }
    .badge-error   { background: #FEE2E2; color: var(--error); }

    .log {
      background: #0F172A;
      color: #CBD5E1;
      border-radius: 6px;
      padding: 1rem;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: .78rem;
      line-height: 1.6;
      max-height: 380px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .inline-err {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 6px;
      padding: .75rem 1rem;
      color: var(--error);
      font-size: .875rem;
      margin-top: .75rem;
      display: none;
    }

    /* ── Results (removed: .results-h .files .file-row .file-label .file-name .file-arrow .drive-row) */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .results-appear { animation: fadeUp .25s ease; }

    .result-meta {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.25rem;
    }
    .result-check {
      width: 30px; height: 30px;
      background: #D1FAE5;
      color: var(--success);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .result-job { font-size: .95rem; line-height: 1.4; }
    .result-job strong { color: var(--text); }
    .result-sep { color: var(--muted); margin: 0 .35rem; }
    .result-job .result-role { color: var(--muted); }

    .framing {
      background: var(--fill);
      border-left: 3px solid var(--border);
      padding: .75rem 1rem;
      border-radius: 0 6px 6px 0;
      font-size: .875rem;
      line-height: 1.6;
      margin-bottom: 1.25rem;
      font-style: italic;
      color: #2D4E6B;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 520px) { .file-grid { grid-template-columns: 1fr; } }

    .file-card {
      display: flex;
      flex-direction: column;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 1rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s, transform .12s;
    }
    .file-card:hover {
      border-color: var(--border);
      box-shadow: 0 4px 12px rgba(43,108,176,.1);
      transform: translateY(-2px);
    }
    .file-card:active { transform: translateY(0); }
    .file-card-icon  { font-size: 1.4rem; margin-bottom: .5rem; line-height: 1; }
    .file-card-label { font-weight: 700; font-size: .875rem; margin-bottom: .2rem; }
    .file-card-desc  { font-size: .775rem; color: var(--muted); flex: 1; margin-bottom: .875rem; }
    .file-card-dl    { font-size: .775rem; font-weight: 600; color: var(--border); display: flex; align-items: center; gap: .25rem; }

    .drive-btn {
      display: flex;
      align-items: center;
      gap: .875rem;
      padding: .875rem 1.125rem;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      font-size: .9rem;
      margin-bottom: 1.25rem;
      transition: background .15s, box-shadow .15s;
    }
    .drive-btn:hover {
      background: var(--fill);
      box-shadow: 0 2px 8px rgba(43,108,176,.12);
    }
    .drive-btn-icon  { font-size: 1.15rem; }
    .drive-btn-text  { flex: 1; }
    .drive-btn-arrow { color: var(--muted); }

    /* ── Spinner ──────────────────────────────────────────────────── */
    .spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: rot .7s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <h1>Job Application Agent</h1>
      <p>Paste a job posting to generate a tailored resume, ATS resume, and cover letter.</p>
    </div>
    <button class="settings-toggle" id="settingsToggle" title="Change password">&#9881;</button>
  </header>

  <!-- ── Settings panel (hidden by default) ─────────────────────── -->
  <div class="settings-panel hidden" id="settingsPanel">
    <h3>&#128274; Change Password</h3>
    <form id="pwForm">
      <div class="pw-fields">
        <div class="field" style="margin-bottom:0">
          <label for="pwCurrent">Current Password</label>
          <input id="pwCurrent" name="current_password" type="password" autocomplete="current-password" required>
        </div>
        <div class="field" style="margin-bottom:0">
          <label for="pwNew">New Password <span class="opt">(min 8 chars)</span></label>
          <input id="pwNew" name="new_password" type="password" autocomplete="new-password" required minlength="8">
        </div>
      </div>
      <button class="btn" type="submit" id="pwSubmitBtn" style="margin-top:.875rem">Update Password</button>
    </form>
    <div class="settings-result" id="settingsResult"></div>
  </div>

  <!-- ── Input form ──────────────────────────────────────────────── -->
  <div class="card" id="formCard">
    <form id="runForm">
      <div class="field">
        <label for="job_posting">Job Posting</label>
        <textarea id="job_posting" name="job_posting" rows="10"
          placeholder="Paste the full job description here…" required></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label for="company">Company</label>
          <input id="company" name="company" type="text"
            placeholder="e.g. Acme Corp" required>
        </div>
        <div class="field">
          <label for="role">Role Title</label>
          <input id="role" name="role" type="text"
            placeholder="e.g. Solutions Engineer" required>
        </div>
      </div>
      <div class="field">
        <label for="contact">Hiring Manager <span class="opt">(optional)</span></label>
        <input id="contact" name="contact" type="text"
          placeholder="Name if known — defaults to 'Hiring Team'">
      </div>
      <div style="display:flex;gap:.75rem;align-items:center;margin-top:.25rem">
        <button class="btn" type="submit" id="submitBtn">Generate</button>
        <span id="queueNote" class="hidden"
          style="font-size:.8rem;color:var(--muted)">
          Another run is in progress — yours will start automatically.
        </span>
      </div>
    </form>
  </div>

  <!-- ── Progress ───────────────────────────────────────────────── -->
  <div class="card hidden" id="progressCard">
    <div class="progress-header">
      <h2>Progress</h2>
      <span class="badge badge-running" id="statusBadge">Running</span>
    </div>
    <div class="log" id="logEl"></div>
    <div class="inline-err" id="inlineErr"></div>
  </div>

  <!-- ── Results ────────────────────────────────────────────────── -->
  <div class="card hidden" id="resultsCard">
    <div class="result-meta">
      <div class="result-check">&#10003;</div>
      <div class="result-job">
        <strong id="resultCompany"></strong><span class="result-sep">&middot;</span><span class="result-role" id="resultRole"></span>
      </div>
    </div>
    <div class="framing hidden" id="framingEl"></div>
    <div class="file-grid" id="fileGrid"></div>
    <a class="drive-btn hidden" id="driveAnchor" target="_blank" rel="noopener">
      <span class="drive-btn-icon">&#x2601;</span>
      <span class="drive-btn-text">Open Google Drive Folder</span>
      <span class="drive-btn-arrow">&#x2197;</span>
    </a>
    <button class="btn btn-ghost" id="newRunBtn">&#x2190; New Application</button>
  </div>

</div><!-- /container -->

<script>
  const form       = document.getElementById('runForm');
  const submitBtn  = document.getElementById('submitBtn');
  const logEl      = document.getElementById('logEl');
  const badge      = document.getElementById('statusBadge');
  const inlineErr  = document.getElementById('inlineErr');

  const show = (id) => document.getElementById(id).classList.remove('hidden');
  const hide = (id) => document.getElementById(id).classList.add('hidden');

  // Captured from the form so the results header can show context
  let _company = '', _role = '';

  function appendLog(msg) {
    logEl.textContent += msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setBadge(status) {
    badge.className = `badge badge-${status}`;
    badge.textContent = { running: 'Running…', queued: 'Queued', done: 'Done', error: 'Error' }[status] ?? status;
  }

  // ── Form submit ──────────────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const raw = Object.fromEntries(new FormData(e.target));
    const body = { job_posting: raw.job_posting, company: raw.company, role: raw.role };
    if (raw.contact.trim()) body.contact = raw.contact.trim();
    _company = raw.company;
    _role    = raw.role;

    // Reset
    logEl.textContent = '';
    inlineErr.style.display = 'none';
    hide('resultsCard');
    show('progressCard');
    hide('queueNote');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spin"></span> Generating…';
    setBadge('running');

    // Start run
    let run_id;
    try {
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      ({ run_id } = await res.json());
    } catch (err) {
      appendLog('❌ Failed to start: ' + err.message);
      setBadge('error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Generate';
      return;
    }

    // Show queue note if another run is in progress
    const st = await fetch(`/api/run/${run_id}/status`).then(r => r.json());
    if (st.status === 'queued') {
      setBadge('queued');
      show('queueNote');
    }

    // Stream SSE progress
    const es = new EventSource(`/api/run/${run_id}/stream`);

    es.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);

      if (msg.type === 'progress') {
        if (badge.className.includes('queued')) { setBadge('running'); hide('queueNote'); }
        appendLog(msg.message);

      } else if (msg.type === 'done') {
        es.close();
        setBadge('done');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generate';
        showResults(run_id, msg);

      } else if (msg.type === 'error') {
        es.close();
        setBadge('error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generate';
        inlineErr.textContent = '❌ ' + msg.message;
        inlineErr.style.display = 'block';
      }
    };

    es.onerror = () => {
      if (badge.className.includes('done') || badge.className.includes('error')) return;
      es.close();
      setBadge('error');
      appendLog('\n⚠ Connection lost. Your run may still be processing.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Generate';
    };
  });

  // ── Show results ─────────────────────────────────────────────────
  function showResults(run_id, msg) {
    const card = document.getElementById('resultsCard');
    show('resultsCard');
    card.classList.add('results-appear');

    // Job context header
    document.getElementById('resultCompany').textContent = _company;
    document.getElementById('resultRole').textContent    = _role;

    // Framing angle
    if (msg.framing_angle) {
      document.getElementById('framingEl').textContent = msg.framing_angle;
      show('framingEl');
    }

    // File cards
    const grid = document.getElementById('fileGrid');
    grid.innerHTML = '';
    const fileTypes = [
      { key: 'resume',       icon: '📄', label: 'Resume',       desc: 'Styled DOCX — branded, formatted'  },
      { key: 'ats',          icon: '📋', label: 'ATS Resume',   desc: 'Plain DOCX — parser-safe'          },
      { key: 'cover_letter', icon: '✉',  label: 'Cover Letter', desc: 'DOCX — tailored to this role'      },
    ];
    for (const { key, icon, label, desc } of fileTypes) {
      const name = msg.files?.[key];
      if (!name) continue;
      const a = document.createElement('a');
      a.className = 'file-card';
      a.href     = `/api/run/${run_id}/files/${encodeURIComponent(name)}`;
      a.download = name;
      a.title    = name;
      a.innerHTML = `
        <div class="file-card-icon">${icon}</div>
        <div class="file-card-label">${label}</div>
        <div class="file-card-desc">${desc}</div>
        <div class="file-card-dl">&#x2193;&nbsp;Download</div>`;
      grid.appendChild(a);
    }

    // Drive link
    if (msg.folder_url) {
      const btn = document.getElementById('driveAnchor');
      btn.href = msg.folder_url;
      show('driveAnchor');
    }
  }

  // ── Settings: toggle panel ───────────────────────────────────────
  document.getElementById('settingsToggle').addEventListener('click', () => {
    const panel = document.getElementById('settingsPanel');
    const isHidden = panel.classList.contains('hidden');
    panel.classList.toggle('hidden');
    if (isHidden) {
      document.getElementById('pwCurrent').focus();
    } else {
      document.getElementById('pwForm').reset();
      const r = document.getElementById('settingsResult');
      r.style.display = 'none';
      r.className = 'settings-result';
    }
  });

  // ── Settings: change password ─────────────────────────────────────
  document.getElementById('pwForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('pwSubmitBtn');
    const result = document.getElementById('settingsResult');
    const data = Object.fromEntries(new FormData(e.target));

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Updating…';
    result.style.display = 'none';

    try {
      const res = await fetch('/api/settings/password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const body = await res.json();

      if (!res.ok) {
        result.className = 'settings-result err';
        result.textContent = '❌ ' + (body.detail ?? 'Something went wrong.');
      } else {
        result.className = 'settings-result ok';
        const lines = ['✓ Password updated.'];
        if (body.emailed)   lines.push(`✓ Confirmation sent to ${body.email_to}.`);
        if (!body.persisted) lines.push('⚠ Not yet permanent — run: fly secrets set APP_PASSWORD="…" --app job-apply-corey');
        result.textContent = lines.join('  ');
        document.getElementById('pwForm').reset();
      }
    } catch (err) {
      result.className = 'settings-result err';
      result.textContent = '❌ Request failed: ' + err.message;
    }

    result.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Update Password';
  });

  // ── New run ───────────────────────────────────────────────────────
  document.getElementById('newRunBtn').addEventListener('click', () => {
    const card = document.getElementById('resultsCard');
    card.classList.remove('results-appear');
    hide('resultsCard');
    hide('framingEl');
    hide('driveAnchor');
    document.getElementById('fileGrid').innerHTML = '';
    hide('progressCard');
    hide('queueNote');
    form.reset();
    logEl.textContent = '';
  });
</script>
</body>
</html>
