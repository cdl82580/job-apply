app            = "job-apply-corey"
primary_region = "bos"

[build]

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 5
    soft_limit = 2

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
