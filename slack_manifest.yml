_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Job Apply
  description: Generate tailored resumes, ATS resumes, cover letters, and interview prep cards — all from Slack.
  background_color: "#1A3C5E"
  long_description: |
    Job Apply bot lets you kick off a full application workflow or generate an
    interview prep card without leaving Slack.

    Commands:
      /apply    — paste a job posting, enter company + role, get resume + ATS resume + cover letter
      /prep     — paste a job posting, pick a round type, get a tailored interview prep card
      /jobstatus — check that the backend API is healthy

    All output files are uploaded to your Google Drive automatically.

features:
  bot_user:
    display_name: Job Apply
    always_online: true
  slash_commands:
    - command: /apply
      description: Generate a tailored resume + cover letter for a job posting
      usage_hint: (opens a form)
      should_escape: false
    - command: /prep
      description: Generate an interview prep card for an upcoming round
      usage_hint: (opens a form)
      should_escape: false
    - command: /jobstatus
      description: Check the status of the Job Apply API backend
      usage_hint: ""
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands          # register slash commands
      - chat:write        # post DMs and messages
      - im:write          # open DM channels to send results back
      - im:history        # read DM channel so the bot can respond in threads

settings:
  # Set to true and add SLACK_APP_TOKEN (xapp-...) to use Socket Mode instead
  # of a public Request URL — useful for local dev or when you don't have a
  # stable HTTPS URL.
  socket_mode_enabled: false
  # Interactivity must be enabled for modals (/apply and /prep forms).
  # Set the Request URL to: https://<your-bot-host>/slack/events
  interactivity:
    is_enabled: true
    request_url: https://YOUR_BOT_HOST/slack/events
  # Slash command Request URL (same endpoint as interactivity).
  # Update this after you have a public URL for the bot.
  event_subscriptions:
    request_url: https://YOUR_BOT_HOST/slack/events
    bot_events:
      - message.im       # receive DMs (optional, for future conversational features)
  org_deploy_enabled: false
  token_rotation_enabled: false
